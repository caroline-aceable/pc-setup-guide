<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setting Up Claude Code on Mac — Aceable</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg-info: #eff6ff; --bg-warn: #fffbeb; --bg-ok: #f0fdf4;
    --text: #1c1917; --text2: #57534e; --text3: #a8a29e;
    --text-info: #1d4ed8; --text-warn: #92400e; --text-ok: #166534;
    --border: #e7e5e4; --border2: #d6d3d1;
    --blue: #185FA5; --blue-dk: #0C447C; --green: #1D9E75; --amber: #BA7517;
    --mono: 'Courier New', monospace; --r: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1917; --bg2: #292524; --bg-info: #1e3a5f; --bg-warn: #3d2500; --bg-ok: #0f2d1c;
      --text: #fafaf9; --text2: #d6d3d1; --text3: #78716c;
      --text-info: #93c5fd; --text-warn: #fcd34d; --text-ok: #86efac;
      --border: #3c3836; --border2: #57534e; --blue: #378ADD; --blue-dk: #185FA5;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--blue); color: #fff; padding: 1.1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header .logo { font-size: 17px; font-weight: 700; }
  header .sub { font-size: 12px; opacity: .7; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
  .prog { display: flex; gap: 3px; margin-bottom: 5px; }
  .seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background .3s; }
  .seg.done { background: var(--green); } .seg.active { background: var(--blue); }
  .prog-lbl { font-size: 12px; color: var(--text3); text-align: right; margin-bottom: 1.75rem; }
  .phase { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; margin-bottom: .35rem; }
  .stitle { font-size: 21px; font-weight: 700; color: var(--text); margin-bottom: .7rem; line-height: 1.3; }
  .body { font-size: 14.5px; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
  .callout { padding: .75rem 1rem; margin-bottom: .8rem; font-size: 13.5px; line-height: 1.6; border-left: 3px solid; border-radius: 0 var(--r) var(--r) 0; }
  .callout strong { font-weight: 600; }
  .tip { background: var(--bg-info); color: var(--text-info); border-color: var(--blue); }
  .warn { background: var(--bg-warn); color: var(--text-warn); border-color: var(--amber); }
  .ok { background: var(--bg-ok); color: var(--text-ok); border-color: var(--green); }
  .bigbox { border-radius: var(--r); padding: 1rem 1.1rem; margin-bottom: .85rem; font-size: 14.5px; line-height: 1.7; font-weight: 500; }
  .bigbox strong { font-weight: 700; }
  .bigbox.warn { border: 2px solid var(--amber); background: var(--bg-warn); color: var(--text-warn); }
  .bigbox.ok { border: 2px solid var(--green); background: var(--bg-ok); color: var(--text-ok); }
  .helpbox { border: 2px solid var(--green); border-radius: var(--r); padding: 1rem 1.1rem; margin-top: 1.25rem; margin-bottom: .5rem; background: var(--bg-ok); color: var(--text-ok); font-size: 13.5px; line-height: 1.7; }
  .helpbox strong { font-weight: 700; display: block; margin-bottom: .25rem; font-size: 14px; }
  .helpbox ol { list-style: none; counter-reset: h; padding: 0; margin: 0; }
  .helpbox ol li { counter-increment: h; display: flex; gap: 8px; margin-bottom: .3rem; }
  .helpbox ol li::before { content: counter(h) "."; font-weight: 700; flex-shrink: 0; }
  ol.steps { list-style: none; counter-reset: s; margin-bottom: 1rem; }
  ol.steps li { counter-increment: s; display: flex; gap: 12px; align-items: flex-start; margin-bottom: .6rem; font-size: 14px; color: var(--text2); line-height: 1.65; }
  ol.steps li::before { content: counter(s); min-width: 23px; height: 23px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; margin-top: 1px; }
  .cb { font-family: var(--mono); font-size: 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: .65rem 1rem; margin-bottom: .8rem; color: var(--text); display: flex; justify-content: space-between; align-items: center; gap: 8px; word-break: break-all; }
  .cpbtn { font-size: 11px; font-weight: 600; color: var(--text3); border: 1px solid var(--border2); background: transparent; border-radius: 5px; padding: 3px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: inherit; transition: all .15s; }
  .cpbtn:hover { background: var(--bg); color: var(--text); }
  .cpbtn.copied { color: var(--text-ok); border-color: var(--green); }
  .kbrow { display: flex; justify-content: space-between; font-size: 13.5px; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: center; color: var(--text2); }
  .kbrow:last-child { border-bottom: none; }
  .kbd { font-family: var(--mono); background: var(--bg2); border: 1px solid var(--border2); padding: 2px 8px; border-radius: 4px; font-size: 11.5px; color: var(--text); white-space: nowrap; }
  hr.div { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .nav { display: flex; gap: 8px; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); align-items: center; }
  .bbk { background: transparent; border: 1px solid var(--border2); color: var(--text2); padding: 10px 20px; border-radius: var(--r); font-size: 14px; cursor: pointer; font-family: inherit; transition: background .15s; }
  .bbk:hover { background: var(--bg2); }
  .bnx { background: var(--blue); color: #fff; border: none; padding: 10px 24px; border-radius: var(--r); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-left: auto; transition: background .15s; }
  .bnx:hover { background: var(--blue-dk); }
  .done-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-ok); border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 26px; color: var(--text-ok); }
  .cl { text-align: left; background: var(--bg2); border-radius: var(--r); padding: .9rem 1.1rem; margin-bottom: 1.25rem; }
  .ci { display: flex; gap: 10px; align-items: flex-start; padding: 5px 0; font-size: 14px; color: var(--text2); border-bottom: 1px solid var(--border); }
  .ci:last-child { border-bottom: none; }
  .ci .ck { color: var(--green); flex-shrink: 0; font-size: 16px; margin-top: 1px; }
  .lbtn { display: inline-block; background: var(--blue); color: #fff; padding: 11px 22px; border-radius: var(--r); font-size: 14px; font-weight: 700; text-decoration: none; cursor: pointer; border: none; font-family: inherit; transition: background .15s; }
  .lbtn:hover { background: var(--blue-dk); }
  code { font-family: var(--mono); font-size: 12.5px; background: var(--bg2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; color: var(--text); }
  @media (max-width: 500px) { .stitle { font-size: 18px; } header .sub { display: none; } }
</style>
</head>
<body>
<header>
  <div class="logo">Aceable · Claude Code Setup</div>
  <div class="sub">Mac Guide</div>
</header>
<div class="wrap">
  <div class="prog" id="prog"></div>
  <div class="prog-lbl" id="plbl"></div>
  <div id="main"></div>
</div>
<script>
let cur=0;

const HELP = `<div class="helpbox"><strong>🟢 Stuck on this step?</strong><ol><li>Try asking <strong>Claude (claude.ai)</strong> directly — describe what happened and paste any error message.</li><li>Still stuck? Take a <strong>screenshot and upload it to Claude</strong> — it can see exactly what you're seeing.</li><li>If that still doesn't resolve it, post in <strong>#guild-ai</strong> on Slack. Someone will help.</li></ol></div>`;

const ALL=[
{phase:"Welcome",title:"Let's get you set up with Claude Code on your Mac",content:`
<div class="body">This guide walks you through everything — from requesting access all the way to your first conversation with Claude. No tech experience needed. Just follow one step at a time and don't skip ahead.</div>
<div class="callout tip"><strong>What is Claude Code?</strong> An AI assistant that lives inside your text editor. It can read your files, help write and review work, and answer questions about Aceable's products. Think of it as a very smart teammate that never sleeps.</div>
<div class="callout tip"><strong>How long will this take?</strong> About 45–60 minutes end to end. You can pause at any step and come back — just remember where you left off using the progress bar at the top.</div>
<div class="helpbox"><strong>🟢 Stuck at any point?</strong><ol><li>Try asking <strong>Claude (claude.ai)</strong> directly — describe what happened and paste any error message.</li><li>Still stuck? Take a <strong>screenshot and upload it to Claude</strong> — it can see exactly what you're seeing.</li><li>If that still doesn't resolve it, post in <strong>#guild-ai</strong> on Slack. Someone will help.</li></ol></div>
`},
{phase:"Getting access",title:"Step 1 — Request access from IT via Slack",content:`
<div class="body">Before you can use Claude Code, IT needs to set up your account. This takes 2 minutes to submit and usually comes back same-day.</div>
<ol class="steps">
<li>Open Slack. In the message box at the bottom of any channel, type <strong>/assist</strong> and press Enter. Slack will leave it in the field unsent — just press Enter once more to open the IT request form.</li>
<li>When the form appears, choose <strong>IT ticket</strong>.</li>
<li>In the Summary field write: <em>Get set up on Claude Code</em></li>
<li>Skip the description and click <strong>Submit</strong>.</li>
</ol>
<div class="callout tip"><strong>Who handles these?</strong> Usually Eric. If you haven't heard back after a day, ping him directly in Slack.</div>
<div class="callout ok"><strong>What you'll receive from IT:</strong> An invitation to join the Aceable GitHub organization + access to Claude.ai with your work email. You'll need both before you can finish this guide — so submit the ticket now even if you're continuing later.</div>
`},
{phase:"Getting access",title:"Step 2 — Create your GitHub account",content:`
<div class="body">GitHub is where Aceable's code lives in the cloud. You need an account so IT can give you access to the right projects.</div>
<ol class="steps">
<li>Go to <strong>github.com</strong> in your browser and click <strong>Sign up</strong>.</li>
<li>Enter your <strong>Aceable email address</strong>.</li>
<li>Create a password.</li>
<li>For your username, use this exact format — IT uses it to find you:</li>
</ol>
<div class="cb"><span>ace-firstname-lastinitial &nbsp;→&nbsp; e.g. ace-jane-s</span></div>
<div class="callout warn"><strong>Username format matters.</strong> If you use anything different, IT can't add you to the right repos. Stick to ace-firstname-lastinitial exactly.</div>
<ol class="steps" style="counter-reset:s 4">
<li>Complete the verification puzzle, then check your email for a code from GitHub and enter it.</li>
<li>GitHub may ask personalization questions — scroll down and click <strong>Skip personalization</strong>.</li>
</ol>
<div class="callout ok"><strong>Done when:</strong> You can log in to github.com and see your dashboard.</div>
`},
{phase:"Installing tools",title:"Step 3 — Open Terminal on your Mac",content:`
<div class="body">Terminal is a built-in Mac app that lets you type commands directly to your computer. It looks a bit intimidating at first — a plain window with text — but you'll only need to use it for a few steps and we'll tell you exactly what to type.</div>
<ol class="steps">
<li>Press <strong>Command + Space</strong> on your keyboard. This opens Spotlight Search — a search bar that appears in the middle of your screen.</li>
<li>Type <strong>Terminal</strong> and press Enter.</li>
<li>A window opens with a dark or white background and a blinking cursor. That's Terminal — you're in!</li>
</ol>
<div class="callout tip"><strong>Pin Terminal to your Dock.</strong> While Terminal is open, right-click its icon in the Dock at the bottom of your screen and choose <strong>Options → Keep in Dock</strong>. You'll use it a few more times today.</div>
<div class="callout tip"><strong>How to paste in Terminal:</strong> Use <strong>Command + V</strong> to paste — same as everywhere else on Mac. Each time we give you a command to run, copy it, click inside Terminal, paste it, and press Enter.</div>
`},
{phase:"Installing tools",title:"Step 4 — Install Homebrew",content:`
<div class="body">Homebrew is like an app store for developer tools — it makes it easy to install the things Claude Code needs. This is a Mac-only tool that makes everything else much simpler.</div>
<ol class="steps">
<li>Open <strong>Terminal</strong> (Command + Space → type Terminal → Enter).</li>
<li>Copy the command below, paste it into Terminal, and press Enter.</li>
</ol>
<div class="cb" id="c4"><span>/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"</span><button class="cpbtn" onclick="doCopy('c4',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 2">
<li>Your Mac may ask for your <strong>Mac login password</strong>. Type it and press Enter. <strong>Nothing will appear as you type — that's normal.</strong></li>
<li>Your Mac may ask <em>"Do you want to install command line developer tools?"</em> — click <strong>Install</strong> and wait for it to finish. Then press Enter to continue.</li>
<li>Homebrew will take 5–10 minutes. You'll see a lot of text scrolling — that's normal. Wait for it to finish.</li>
<li>When done, it may show two lines starting with <code>export PATH=</code> and <code>eval</code>. If you see those, copy and paste them one at a time into Terminal and press Enter after each.</li>
</ol>
<div class="callout tip"><strong>How do you know it worked?</strong> Type <code>brew --version</code> and press Enter. You should see a version number like <em>Homebrew 4.x.x</em></div>
`},
{phase:"Installing tools",title:"Step 5 — Install nvm (Node Version Manager)",content:`
<div class="body">nvm is a small tool that manages which version of Node.js is installed on your Mac. Think of it as a version switcher — it makes sure Claude Code gets exactly the right version it needs.</div>
<ol class="steps">
<li>In Terminal, copy and paste this command and press Enter:</li>
</ol>
<div class="cb" id="c5"><span>curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash</span><button class="cpbtn" onclick="doCopy('c5',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 1">
<li>Wait for it to finish. You'll see a few lines of text.</li>
<li>Now <strong>close Terminal completely</strong> — press <strong>Command + Q</strong>. Then reopen it (Command + Space → Terminal). This is required for nvm to work.</li>
<li>Type this to confirm nvm installed correctly:</li>
</ol>
<div class="cb" id="c5b"><span>nvm --version</span><button class="cpbtn" onclick="doCopy('c5b',this)">Copy</button></div>
<div class="callout ok"><strong>Done when:</strong> You see a version number like <em>0.39.7</em></div>
<div class="callout warn"><strong>If you see "nvm: command not found"</strong> — you need to close and reopen Terminal. The install added nvm to your shell profile, but it only loads in fresh Terminal windows.</div>
`},
{phase:"Installing tools",title:"Step 6 — Install Node.js",content:`
<div class="body">Node.js is the engine that powers Claude Code behind the scenes. You won't interact with it directly — it just needs to be there. We're installing version 24, which is the version Aceable recommends.</div>
<ol class="steps">
<li>In Terminal, copy and paste this command and press Enter:</li>
</ol>
<div class="cb" id="c6"><span>nvm install 24</span><button class="cpbtn" onclick="doCopy('c6',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 1">
<li>Wait for it to download and install. You'll see a progress bar — that's normal.</li>
<li>When it's done, set it as your default version:</li>
</ol>
<div class="cb" id="c6b"><span>nvm use 24</span><button class="cpbtn" onclick="doCopy('c6b',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 3">
<li>Confirm it worked:</li>
</ol>
<div class="cb" id="c6c"><span>node --version</span><button class="cpbtn" onclick="doCopy('c6c',this)">Copy</button></div>
<div class="callout ok"><strong>Done when:</strong> You see <em>v24.x.x</em> — Node.js is ready.</div>
`},
{phase:"Installing tools",title:"Step 7 — Install Claude Code",content:`
<div class="body">Now we install Claude Code itself. This is the AI tool that will live in your terminal and inside VS Code.</div>
<ol class="steps">
<li>In Terminal, copy and paste this command and press Enter:</li>
</ol>
<div class="cb" id="c7"><span>npm install -g @anthropic-ai/claude-code</span><button class="cpbtn" onclick="doCopy('c7',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 1">
<li>Wait for it to finish — you'll see text scrolling, that's normal. Takes about 1–2 minutes.</li>
<li>Confirm it installed correctly:</li>
</ol>
<div class="cb" id="c7b"><span>claude --version</span><button class="cpbtn" onclick="doCopy('c7b',this)">Copy</button></div>
<div class="callout ok"><strong>Done when:</strong> You see a version number — Claude Code is installed!</div>
<div class="callout warn"><strong>If you see "permission denied"</strong> — do NOT use sudo. Instead, close Terminal, reopen it, and try the install command again.</div>
`},
{phase:"Signing in",title:"Step 8 — Sign in to Claude Code",content:`
<div class="body">Now we connect Claude Code to your Aceable account. This only needs to be done once — after that, Claude remembers you.</div>
<div class="bigbox warn"><strong>Before this step:</strong> Make sure you've received your Claude.ai invitation from IT. It arrives as an email to your Aceable address. If you haven't received it yet, stop here and check your inbox — or follow up with Eric in Slack.</div>
<ol class="steps">
<li>In Terminal, type this and press Enter:</li>
</ol>
<div class="cb" id="c8"><span>claude</span><button class="cpbtn" onclick="doCopy('c8',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 1">
<li>A browser window will automatically open asking you to sign in to Claude. Sign in with your <strong>Aceable email address</strong>.</li>
<li>Click <strong>Authorize</strong> when prompted.</li>
<li>Switch back to Terminal — you should see a welcome message from Claude.</li>
<li>Type <strong>exit</strong> and press Enter to close the Claude session for now.</li>
</ol>
<div class="callout ok"><strong>Done when:</strong> You saw the Claude welcome screen in Terminal. Authentication is saved — you won't need to do this again.</div>
`},
{phase:"Installing tools",title:"Step 9 — Install VS Code",content:`
<div class="body">VS Code (Visual Studio Code) is the text editor where you'll spend most of your time working with Claude. It's free, made by Microsoft, and works beautifully on Mac.</div>
<ol class="steps">
<li>Go to <strong>code.visualstudio.com</strong> in your browser and click the big <strong>Download for Mac</strong> button.</li>
<li>Find the downloaded file. Open <strong>Finder</strong> (the smiley face icon in your Dock), then click <strong>Downloads</strong> on the left side.</li>
<li>You'll see a file called <em>VSCode-darwin-universal.zip</em> or similar. Double-click it to unzip it.</li>
<li>A <strong>Visual Studio Code</strong> app icon will appear. <strong>Drag it into your Applications folder.</strong> In Finder, click <strong>Applications</strong> on the left side to find it.</li>
<li>Open VS Code from your Applications folder. Your Mac may ask <em>"Are you sure you want to open this?"</em> — click <strong>Open</strong>.</li>
</ol>
<div class="callout tip"><strong>Add VS Code to your Dock.</strong> While VS Code is open, right-click its icon in the Dock and choose <strong>Options → Keep in Dock</strong>.</div>
<div class="callout ok"><strong>Done when:</strong> VS Code opens and you can see the Welcome tab.</div>
`},
{phase:"Installing tools",title:"Step 10 — Connect VS Code to Terminal",content:`
<div class="body">This step lets you open VS Code directly from Terminal with a simple command. It only takes a minute and makes your life much easier later on.</div>
<ol class="steps">
<li>Inside VS Code, press <strong>Command + Shift + P</strong>. A search bar drops down from the top — this is the Command Palette. You'll use this a lot.</li>
<li>Type: <strong>Shell Command</strong> and look for <strong>"Shell Command: Install 'code' command in PATH"</strong>. Click it.</li>
<li>VS Code will ask for your Mac password — enter it and click OK.</li>
<li>You'll see a success notification at the bottom of VS Code.</li>
</ol>
<div class="callout tip"><strong>What does this do?</strong> Now you can type <code>code .</code> in Terminal to open any folder in VS Code instantly.</div>
<div class="callout ok"><strong>Done when:</strong> You see the success notification in VS Code.</div>
`},
{phase:"Setting up",title:"Step 11 — Install the Claude Code extension in VS Code",content:`
<div class="body">Extensions are add-ons that give VS Code extra abilities — like apps on a phone. We're installing the official Claude Code extension made by Anthropic. This is how most people at Aceable interact with Claude day-to-day.</div>
<ol class="steps">
<li>Make sure VS Code is open.</li>
<li>Press <strong>Command + Shift + X</strong> to open the Extensions panel on the left side of VS Code.</li>
<li>In the search box at the top, type: <strong>Claude Code</strong></li>
<li>Find the extension published by <strong>Anthropic</strong> and click the blue <strong>Install</strong> button next to it.</li>
<li>Wait for it to finish — you'll see a spinning icon, then a gear icon when it's done.</li>
</ol>
<div class="callout tip"><strong>Extension not appearing after install?</strong> Press <strong>Command + Shift + P</strong>, type <em>Developer: Reload Window</em>, and press Enter.</div>
`},
{phase:"Setting up",title:"Step 12 — First-time setup in VS Code",content:`
<div class="body">The first time you open Claude Code inside VS Code, it needs a couple of quick things from you. Here's exactly what to expect.</div>
<ol class="steps">
<li>Open VS Code and open any file — or press <strong>Command + N</strong> to create a blank one. <em>The Claude icon only appears when a file is open.</em></li>
<li>Look for the <strong>spark icon (✦)</strong> in the top-right toolbar of VS Code. Click it.</li>
<li>A browser window opens asking you to authorize Claude Code. Click <strong>Authorize</strong>, then switch back to VS Code.</li>
<li>VS Code will ask about terminal settings — click <strong>Yes</strong>. This lets you use Shift+Enter for new lines.</li>
<li>VS Code will ask if you trust your project folder — click <strong>Yes, I trust the authors</strong>.</li>
</ol>
<div class="callout ok"><strong>Done when:</strong> A Claude chat panel is open inside VS Code and you can see your Aceable email in the account area.</div>
<div class="bigbox warn"><strong>Important — before you continue to Step 13:</strong> You need to have accepted your GitHub organization invite from IT. It arrives as an email from GitHub. Check your inbox and accept it before moving on.</div>
`},
{phase:"Setting up",title:"Step 13 — Install the GitHub CLI",content:`
<div class="body">The GitHub CLI is a tool that lets Claude connect to GitHub on your behalf — cloning repos, creating branches, and more. It's a one-time setup.</div>
<ol class="steps">
<li>Open <strong>Terminal</strong> and paste this command, then press Enter:</li>
</ol>
<div class="cb" id="c13"><span>brew install gh</span><button class="cpbtn" onclick="doCopy('c13',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 1">
<li>Wait for it to finish. Then connect it to your GitHub account:</li>
</ol>
<div class="cb" id="c13b"><span>gh auth login</span><button class="cpbtn" onclick="doCopy('c13b',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 2">
<li>It will ask you a few questions. Answer them like this:<br>• <strong>Where do you use GitHub?</strong> → GitHub.com<br>• <strong>What is your preferred protocol?</strong> → HTTPS<br>• <strong>How would you like to authenticate?</strong> → Login with a web browser</li>
<li>Copy the one-time code it shows you, then press Enter. Your browser will open — paste the code and click <strong>Authorize</strong>.</li>
<li>Switch back to Terminal — you should see a success message.</li>
</ol>
<div class="callout ok"><strong>Done when:</strong> Terminal says "Logged in as ace-yourname" — GitHub CLI is connected.</div>
`},
{phase:"First steps",title:"Step 14 — Get access to Aceable's shared codebase",content:`
<div class="bigbox warn"><strong>Before starting this step:</strong> You need to have accepted your GitHub organization invite from IT. It arrives as an email from GitHub saying you've been invited to join the aceable organization. Find that email and click Accept before continuing.</div>
<div class="body">Now we'll pull down Aceable's shared codebase. This gives Claude access to real Aceable products so it can answer questions about how things actually work at Aceable.</div>
<ol class="steps">
<li>Open VS Code and open the Claude Code panel (spark icon ✦ or Command+Shift+P → Claude Code).</li>
<li>In the Claude chat, paste this message and press Enter:</li>
</ol>
<div class="cb" id="c14"><span>Clone https://github.com/aceable/acewares.git — afterwards, start all new Claude sessions from that folder. Open the folder in VS Code so I can see the files.</span><button class="cpbtn" onclick="doCopy('c14',this)">Copy</button></div>
<ol class="steps" style="counter-reset:s 2">
<li>Claude will run the clone for you. If it asks for permission to run a command, click <strong>Allow</strong>.</li>
<li>When it's done, you'll see the acewares folder appear in VS Code's file explorer panel on the left.</li>
</ol>
<div class="callout ok"><strong>Done when:</strong> The acewares folder is visible in VS Code and Claude can answer questions about it.</div>
<div class="callout tip"><strong>Going forward:</strong> Always open VS Code from the acewares folder to give Claude the most context about Aceable's products.</div>
`},
{phase:"First steps",title:"Step 15 — How to open and use Claude Code",content:`
<div class="body">There are a few ways to reach Claude inside VS Code. Here are all of them:</div>
<div style="margin-bottom:1rem">
<div class="kbrow"><span><strong>Spark icon (✦)</strong> — top-right toolbar of VS Code</span><span style="font-size:12px;color:var(--text3)">needs a file open</span></div>
<div class="kbrow"><span><strong>Command Palette</strong> → type "Claude Code" → Enter</span><span class="kbd">⌘+Shift+P</span></div>
<div class="kbrow"><span><strong>Status bar</strong> — bottom-right corner of VS Code</span><span style="font-size:12px;color:var(--text3)">✱ Claude Code</span></div>
</div>
<hr class="div">
<p style="font-size:13px;color:var(--text2);margin-bottom:.65rem;font-weight:600">Useful shortcuts once Claude is open:</p>
<div>
<div class="kbrow"><span>Start a new conversation</span><span class="kbd">⌘+N</span></div>
<div class="kbrow"><span>Switch between your code and Claude</span><span class="kbd">⌘+Esc</span></div>
<div class="kbrow"><span>Open Extensions panel</span><span class="kbd">⌘+Shift+X</span></div>
<div class="kbrow"><span>Open Command Palette</span><span class="kbd">⌘+Shift+P</span></div>
<div class="kbrow"><span>New line without sending</span><span class="kbd">Shift+Enter</span></div>
</div>
<div class="callout tip" style="margin-top:.85rem"><strong>Talk to it naturally.</strong> Just type what you want like you'd ask a teammate: "What does this file do?" or "Help me understand this code." No special commands needed.</div>
<div class="callout tip" style="margin-top:.5rem"><strong>Want to go deeper?</strong> Check out <strong>#guild-ai</strong> on Slack — people share tips, prompts, and use cases there every day.</div>
`},

function doCopy(id,btn){const t=document.getElementById(id).querySelector('span').textContent;navigator.clipboard.writeText(t).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);});}

function render(){
  const s=ALL[cur],total=ALL.length-1;
  document.getElementById('prog').innerHTML=ALL.map((_,i)=>`<div class="seg ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
  document.getElementById('plbl').textContent=s.done?'Complete!':`Step ${cur} of ${total}`;
  const main=document.getElementById('main');
  if(s.done){main.innerHTML=`<div class="phase">${s.phase}</div><div class="stitle">${s.title}</div>${s.content}`;return;}
  const isFirst=cur===0,isLast=cur===ALL.length-2;
  main.innerHTML=`
    <div class="phase">${s.phase}${!isFirst?' · Step '+cur+' of '+total:''}</div>
    <div class="stitle">${s.title}</div>
    ${s.content}
    ${!isFirst ? HELP : ''}
    <div class="nav">
      ${!isFirst?`<button class="bbk" onclick="go(-1)">← Back</button>`:'<span></span>'}
      <button class="bnx" onclick="go(1)">${isLast?'Finish ✓':'Next →'}</button>
    </div>`;
}

function go(dir){cur=Math.max(0,Math.min(ALL.length-1,cur+dir));render();window.scrollTo({top:0,behavior:'smooth'});}
render();
</script>
